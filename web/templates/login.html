{% extends "base.html" %}
{% block title %}{{ t('login.title') }}{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="card p-8 w-full max-w-md" x-data="loginPage()">
    <h1 class="text-2xl font-semibold mb-1">{{ t('login.title') }}</h1>
    <p class="text-text-muted text-sm mb-6">{{ t('app.tagline') }}</p>

    <!-- 切换模式 -->
    <div class="flex gap-2 mb-6 border-b border-line">
      <button type="button" @click="mode='code'; msg=''; ok=false"
              :class="mode==='code' ? 'text-accent border-accent' : 'text-text-muted border-transparent'"
              class="pb-2 px-1 border-b-2 text-sm">{{ t('login.with_code') }}</button>
      <button type="button" @click="mode='password'; msg=''; ok=false"
              :class="mode==='password' ? 'text-accent border-accent' : 'text-text-muted border-transparent'"
              class="pb-2 px-1 border-b-2 text-sm">{{ t('login.password_login') }}</button>
    </div>

    <!-- 验证码模式 -->
    <div x-show="mode==='code'">
      <label class="block text-sm text-text-muted mb-1">{{ t('login.phone') }}</label>
      <input x-model="phone" type="tel" maxlength="11" class="w-full mb-3" placeholder="138...">
      <label class="block text-sm text-text-muted mb-1">{{ t('login.code') }}</label>
      <div class="flex gap-2 mb-3">
        <input x-model="code" type="text" maxlength="6" class="flex-1" placeholder="6 位验证码">
        <button type="button" @click="sendCode()" :disabled="loading"
                class="btn btn-ghost text-xs whitespace-nowrap">{{ t('login.send_code') }}</button>
      </div>
      <label class="block text-sm text-text-muted mb-1">{{ t('login.invite_code') }}</label>
      <input x-model="inviteCode" type="text" maxlength="8" class="w-full mb-3 uppercase" placeholder="A123456">
      <label class="flex items-center gap-2 mb-4 text-sm text-text-muted cursor-pointer select-none">
        <input type="checkbox" x-model="rememberMe" class="w-4 h-4 accent-accent">
        <span>保持 30 天免登录</span>
      </label>
      <button type="button" @click="verifyCode()" :disabled="loading"
              class="btn btn-primary w-full justify-center">
        <span x-show="!loading">{{ t('login.submit') }}</span>
        <span x-show="loading">...</span>
      </button>
    </div>

    <!-- 密码模式 (仅 admin) -->
    <div x-show="mode==='password'" style="display:none">
      <label class="block text-sm text-text-muted mb-1">{{ t('login.phone') }}</label>
      <input x-model="phone" type="tel" maxlength="11" class="w-full mb-3" placeholder="管理员手机号">
      <label class="block text-sm text-text-muted mb-1">{{ t('login.password') }}</label>
      <input x-model="password" type="password" class="w-full mb-3"
             @keyup.enter="passwordLogin()" placeholder="管理员密码">
      <label class="flex items-center gap-2 mb-4 text-sm text-text-muted cursor-pointer select-none">
        <input type="checkbox" x-model="rememberMe" class="w-4 h-4 accent-accent">
        <span>保持 30 天免登录</span>
      </label>
      <button type="button" @click="passwordLogin()" :disabled="loading"
              class="btn btn-primary w-full justify-center">
        <span x-show="!loading">{{ t('login.submit') }}</span>
        <span x-show="loading">...</span>
      </button>
    </div>

    <p x-show="msg" x-text="msg" class="mt-4 text-sm text-center"
       :class="ok ? 'text-success' : 'text-danger'"></p>
    <p x-show="devCode" class="mt-2 text-xs text-warn text-center">
      [Dev] code: <code x-text="devCode" class="bg-bg-hover px-2 py-0.5 rounded"></code>
      <button type="button" @click="code=devCode" class="text-accent ml-2">填入</button>
    </p>
  </div>
</div>

<script>
function loginPage() {
  return {
    mode: 'code',
    phone: '',
    code: '',
    password: '',
    inviteCode: new URLSearchParams(location.search).get('invite_code') || '',
    rememberMe: localStorage.getItem('remember_me') === '1',
    loading: false,
    msg: '',
    ok: false,
    devCode: '',

    async sendCode() {
      if (!/^1\d{10}$/.test(this.phone)) {
        this.msg = '手机号格式不正确';
        this.ok = false;
        return;
      }
      this.loading = true;
      try {
        const r = await fetch('/api/auth/send-code', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({phone: this.phone}),
        });
        const d = await r.json();
        if (r.ok) {
          this.msg = '✓ 验证码已发送';
          this.ok = true;
          if (d.dev_code) this.devCode = d.dev_code;
        } else {
          this.msg = d.detail || '发送失败';
          this.ok = false;
        }
      } catch (e) {
        this.msg = '网络错误: ' + e.message;
        this.ok = false;
      } finally {
        this.loading = false;
      }
    },

    async verifyCode() {
      if (!/^1\d{10}$/.test(this.phone)) { this.msg = '手机号格式不正确'; this.ok = false; return; }
      if (this.code.length < 4) { this.msg = '请输入验证码'; this.ok = false; return; }
      this.loading = true;
      try {
        const r = await fetch('/api/auth/verify', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          credentials: 'include',
          body: JSON.stringify({
            phone: this.phone,
            code: this.code,
            invite_code: this.inviteCode || null,
            remember_me: this.rememberMe,
          }),
        });
        const d = await r.json();
        if (r.ok) {
          this.msg = '✓ 登录成功, 跳转中...';
          this.ok = true;
          localStorage.setItem('remember_me', this.rememberMe ? '1' : '0');
          setTimeout(() => location.href = '/', 500);
        } else {
          this.msg = d.detail || '登录失败';
          this.ok = false;
        }
      } catch (e) {
        this.msg = '网络错误: ' + e.message;
        this.ok = false;
      } finally {
        this.loading = false;
      }
    },

    async passwordLogin() {
      if (!/^1\d{10}$/.test(this.phone)) { this.msg = '手机号格式不正确'; this.ok = false; return; }
      if (!this.password) { this.msg = '请输入密码'; this.ok = false; return; }
      this.loading = true;
      try {
        const r = await fetch('/api/auth/password-login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          credentials: 'include',
          body: JSON.stringify({
            phone: this.phone,
            password: this.password,
            remember_me: this.rememberMe,
          }),
        });
        const d = await r.json();
        if (r.ok) {
          this.msg = '✓ 登录成功, 跳转中...';
          this.ok = true;
          localStorage.setItem('remember_me', this.rememberMe ? '1' : '0');
          setTimeout(() => location.href = '/', 500);
        } else {
          this.msg = d.detail || '登录失败';
          this.ok = false;
        }
      } catch (e) {
        this.msg = '网络错误: ' + e.message;
        this.ok = false;
      } finally {
        this.loading = false;
      }
    },
  };
}
</script>
{% endblock %}
