{% extends "base.html" %}
{% block title %}{{ t('login.title') }}{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="card p-8 w-full max-w-md" x-data="{ mode: 'code', loading: false, msg: '', dev_code: '' }">
    <h1 class="text-2xl font-semibold mb-1">{{ t('login.title') }}</h1>
    <p class="text-text-muted text-sm mb-6">{{ t('app.tagline') }}</p>

    <!-- 切换模式 -->
    <div class="flex gap-2 mb-6 border-b border-line">
      <button @click="mode='code'; msg=''" :class="mode==='code' ? 'text-accent border-accent' : 'text-text-muted border-transparent'"
              class="pb-2 px-1 border-b-2 text-sm">{{ t('login.with_code') }}</button>
      <button @click="mode='password'; msg=''" :class="mode==='password' ? 'text-accent border-accent' : 'text-text-muted border-transparent'"
              class="pb-2 px-1 border-b-2 text-sm">{{ t('login.password_login') }}</button>
    </div>

    <!-- 验证码模式 -->
    <div x-show="mode==='code'">
      <label class="block text-sm text-text-muted mb-1">{{ t('login.phone') }}</label>
      <input id="phone1" type="tel" maxlength="11" class="w-full mb-3" placeholder="138...">
      <label class="block text-sm text-text-muted mb-1">{{ t('login.code') }}</label>
      <div class="flex gap-2 mb-3">
        <input id="code" type="text" maxlength="6" class="flex-1" placeholder="6 位验证码">
        <button @click="sendCode()" :disabled="loading" class="btn btn-ghost text-xs whitespace-nowrap">{{ t('login.send_code') }}</button>
      </div>
      <label class="block text-sm text-text-muted mb-1">{{ t('login.invite_code') }}</label>
      <input id="invite" type="text" maxlength="8" class="w-full mb-4" placeholder="A123456" value="{{ invite_code or '' }}">
      <button @click="verifyCode()" class="btn btn-primary w-full justify-center">{{ t('login.submit') }}</button>
    </div>

    <!-- 密码模式 (仅 admin) -->
    <div x-show="mode==='password'" style="display:none">
      <label class="block text-sm text-text-muted mb-1">{{ t('login.phone') }}</label>
      <input id="phone2" type="tel" maxlength="11" class="w-full mb-3" placeholder="管理员手机号">
      <label class="block text-sm text-text-muted mb-1">{{ t('login.password') }}</label>
      <input id="password" type="password" class="w-full mb-4" placeholder="管理员密码">
      <button @click="passwordLogin()" class="btn btn-primary w-full justify-center">{{ t('login.submit') }}</button>
    </div>

    <p x-show="msg" x-text="msg" class="mt-4 text-sm text-center" :class="msg.startsWith('✓') ? 'text-success' : 'text-danger'"></p>
    <p x-show="dev_code" class="mt-2 text-xs text-warn text-center">[Dev] code: <code x-text="dev_code"></code></p>
  </div>
</div>

<script>
async function sendCode() {
  const phone = document.getElementById('phone1').value.trim();
  if (!/^1\d{10}$/.test(phone)) { setMsg('手机号格式不正确', false); return; }
  const r = await fetch('/api/auth/send-code', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({phone})});
  const d = await r.json();
  if (r.ok) { setMsg('✓ ' + (window.t ? window.t('login.code_sent') : '验证码已发送'), true); if (d.dev_code) setDev(d.dev_code); }
  else setMsg(d.detail || '发送失败', false);
}
async function verifyCode() {
  const phone = document.getElementById('phone1').value.trim();
  const code = document.getElementById('code').value.trim();
  const invite_code = document.getElementById('invite').value.trim() || null;
  const r = await fetch('/api/auth/verify', {method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({phone, code, invite_code})});
  const d = await r.json();
  if (r.ok) { setMsg('✓ 登录成功, 跳转中...', true); setTimeout(() => location.href = '/', 600); }
  else setMsg(d.detail || '登录失败', false);
}
async function passwordLogin() {
  const phone = document.getElementById('phone2').value.trim();
  const password = document.getElementById('password').value;
  const r = await fetch('/api/auth/password-login', {method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({phone, password})});
  const d = await r.json();
  if (r.ok) { setMsg('✓ 登录成功', true); setTimeout(() => location.href = '/', 600); }
  else setMsg(d.detail || '登录失败', false);
}

function setMsg(text, ok) {
  const el = document.querySelector('[x-data]');
  el.__x.$data.msg = text;
}
function setDev(code) {
  const el = document.querySelector('[x-data]');
  el.__x.$data.dev_code = code;
}
</script>
{% endblock %}
